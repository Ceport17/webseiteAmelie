<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preload kritische Schriften -->
    <link rel="preload" href="/src/fonts/Nunito-VariableFont_wght.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Preconnect für externe Ressourcen -->
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

    <!-- Titel im Browser-Tab -->
    <title>Amelie Artstudio</title>

    <!-- SEO Beschreibung (Google Ergebnis) -->
    <meta
      name="description"
      content="Amelie Artstudio - persönliche StrukturBilder und kreative Auftragsarbeiten für dein Zuhause."
    />

    <!-- Open Graph (für WhatsApp, Instagram, etc.) -->
    <meta property="og:title" content="Amelie Artstudio" />
    <meta
      property="og:description"
      content="Individuelle StrukturBilder und kreative Auftragsarbeiten für dein Zuhause."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://amelie-artstudio.de" />

    <!-- Optional: Vorschaubild beim Teilen (empfohlen) -->
    <!-- <meta property="og:image" content="https://amelie-artstudio.de/preview.jpg" /> -->

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
